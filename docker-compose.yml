version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: noteapp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: note_management
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - noteapp-net

  web:
    build: .
    container_name: noteapp_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: note_management
      DB_USER: root
      DB_PASSWORD: root
      WS_SECRET: "your-very-long-random-secret-change-this"
    networks:
      - noteapp-net

  websocket:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    container_name: noteapp_ws
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - web
      - db
    environment:
      DB_HOST: db
      DB_NAME: note_management
      DB_USER: root
      DB_PASSWORD: root
      WS_SECRET: "your-very-long-random-secret-change-this"
    networks:
      - noteapp-net

volumes:
  db_data:

networks:
  noteapp-net:
    driver: bridge